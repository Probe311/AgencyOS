openapi: 3.0.0
info:
  title: AgencyOS REST API
  description: API REST custom pour AgencyOS permettant l'intégration avec des systèmes tiers
  version: 1.0.0
  contact:
    name: AgencyOS Support
    email: support@agencyos.com
    url: https://docs.agencyos.com/api

servers:
  - url: https://your-domain.com/api
    description: Production server
  - url: http://localhost:3000/api
    description: Development server

tags:
  - name: Leads
    description: Gestion des leads
  - name: Tasks
    description: Gestion des tâches
  - name: Tokens
    description: Gestion des tokens API

security:
  - BearerAuth: []

paths:
  /leads:
    get:
      tags:
        - Leads
      summary: Liste des leads
      description: Récupère une liste paginée de leads avec filtres optionnels
      operationId: getLeads
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Liste des leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Lead'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Leads
      summary: Créer un lead
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadRequest'
      responses:
        '201':
          description: Lead créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /leads/{id}:
    get:
      tags:
        - Leads
      summary: Récupérer un lead
      operationId: getLead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Lead'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Leads
      summary: Mettre à jour un lead
      operationId: updateLead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadRequest'
      responses:
        '200':
          description: Lead mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Lead'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Leads
      summary: Supprimer un lead
      operationId: deleteLead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lead supprimé
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks:
    get:
      tags:
        - Tasks
      summary: Liste des tâches
      operationId: getTasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Liste des tâches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      tags:
        - Tasks
      summary: Créer une tâche
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Tâche créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Récupérer une tâche
      operationId: getTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tâche trouvée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'

  /tokens:
    get:
      tags:
        - Tokens
      summary: Liste des tokens API
      operationId: getTokens
      responses:
        '200':
          description: Liste des tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiToken'
    post:
      tags:
        - Tokens
      summary: Créer un token API
      operationId: createToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
      responses:
        '201':
          description: Token créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ApiTokenWithSecret'
                  warning:
                    type: string

  /tokens/{id}:
    patch:
      tags:
        - Tokens
      summary: Mettre à jour un token
      operationId: updateToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
      responses:
        '200':
          description: Token mis à jour
    delete:
      tags:
        - Tokens
      summary: Supprimer un token
      operationId: deleteToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Token supprimé

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        company:
          type: string
        status:
          type: string
        stage:
          type: string
        created_at:
          type: string
          format: date-time

    CreateLeadRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        status:
          type: string
        stage:
          type: string

    UpdateLeadRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        status:
          type: string
        stage:
          type: string

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date-time

    ApiToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        token_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        rate_limit_per_minute:
          type: integer
        rate_limit_per_hour:
          type: integer
        rate_limit_per_day:
          type: integer
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    ApiTokenWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiToken'
        - type: object
          properties:
            token:
              type: string

    CreateTokenRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        rate_limit_per_minute:
          type: integer
          default: 60
        rate_limit_per_hour:
          type: integer
          default: 1000
        rate_limit_per_day:
          type: integer
          default: 10000
        expires_at:
          type: string
          format: date-time
        ip_whitelist:
          type: array
          items:
            type: string

    UpdateTokenRequest:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        rate_limit_per_minute:
          type: integer
        rate_limit_per_hour:
          type: integer
        rate_limit_per_day:
          type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Accès interdit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: Trop de requêtes
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  retryAfter:
                    type: integer

